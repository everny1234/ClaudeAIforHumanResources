<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Claude for HR Professionals — Full Course</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --navy: #1a1a2e;
  --blue: #0f3460;
  --gold: #f59e0b;
  --gold-light: #fbbf24;
  --green: #10b981;
  --red: #ef4444;
  --purple: #6366f1;
  --cream: #f5f7ff;
  --warm: #e8eeff;
  --white: #ffffff;
  --muted: #4a5568;
  --text: #1a202c;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:#f5f7ff; color:var(--text); }

/* SIDEBAR */
.layout { display:grid; grid-template-columns:280px 1fr; min-height:100vh; }

.sidebar {
  background:#162040;
  position:sticky; top:0; height:100vh;
  overflow-y:auto; padding:0;
  display:flex; flex-direction:column;
}

.sidebar-header {
  padding:28px 24px 20px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.sidebar-logo {
  font-family:'Playfair Display',serif;
  font-size:15px; font-weight:700;
  color:var(--white); line-height:1.3;
  margin-bottom:6px;
}

.sidebar-sub {
  font-size:11px; color:rgba(255,255,255,0.4);
  letter-spacing:1px; text-transform:uppercase;
}

.progress-bar-wrap {
  padding:16px 24px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.progress-label {
  font-size:11px; color:rgba(255,255,255,0.4);
  margin-bottom:8px; display:flex; justify-content:space-between;
}

.progress-bar {
  height:4px; background:rgba(255,255,255,0.1);
  border-radius:2px; overflow:hidden;
}

.progress-fill {
  height:100%; background:var(--gold);
  border-radius:2px; transition:width 0.5s ease;
  width:0%;
}

.module-nav { padding:12px 0; flex:1; }

.module-nav-item {
  padding:0;
  cursor:pointer;
  border:none; background:none;
  width:100%; text-align:left;
}

.module-nav-header {
  display:flex; align-items:center; gap:12px;
  padding:12px 24px;
  transition:background 0.2s;
}

.module-nav-item:hover .module-nav-header,
.module-nav-item.active .module-nav-header {
  background:rgba(255,255,255,0.06);
}

.module-nav-item.active .module-nav-header {
  border-left:3px solid var(--gold);
  padding-left:21px;
}

.nav-num {
  width:28px; height:28px;
  background:rgba(255,255,255,0.08);
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:600; color:rgba(255,255,255,0.5);
  flex-shrink:0; transition:all 0.2s;
}

.module-nav-item.active .nav-num,
.module-nav-item.completed .nav-num {
  background:var(--gold); color:var(--navy);
}

.module-nav-item.completed .nav-num::after { content:'✓'; }

.nav-info { flex:1; min-width:0; }

.nav-title {
  font-size:13px; font-weight:500; color:rgba(255,255,255,0.8);
  line-height:1.3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}

.nav-meta {
  font-size:11px; color:rgba(255,255,255,0.3);
  margin-top:2px;
}

.lesson-nav {
  padding:4px 24px 12px 64px;
  display:none;
}

.module-nav-item.active .lesson-nav { display:block; }

.lesson-nav-item {
  font-size:12px; color:rgba(255,255,255,0.4);
  padding:5px 0;
  cursor:pointer;
  transition:color 0.2s;
  display:flex; align-items:center; gap:8px;
}

.lesson-nav-item:hover { color:rgba(255,255,255,0.8); }
.lesson-nav-item.active { color:var(--gold); }
.lesson-nav-item::before { content:'·'; font-size:16px; }

/* MAIN CONTENT */
.main { overflow-y:auto; background:#f5f7ff; }

.module-page { display:none; padding:0; }
.module-page.active { display:block; }

/* MODULE HEADER */
.module-header {
  background:linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
  padding:60px 64px 48px;
  position:relative; overflow:hidden;
}

.module-header::before {
  content:'';
  position:absolute; inset:0;
  background:radial-gradient(ellipse at 80% 50%, rgba(245,158,11,0.15), transparent 60%);
}

.module-eyebrow {
  font-size:11px; font-weight:600; letter-spacing:3px;
  text-transform:uppercase; color:var(--gold);
  margin-bottom:16px; position:relative;
}

.module-title-main {
  font-family:'Playfair Display',serif;
  font-size:clamp(32px,4vw,52px); font-weight:900;
  color:var(--white); line-height:1.1;
  margin-bottom:16px; position:relative;
}

.module-title-main em { font-style:italic; color:var(--gold); }

.module-desc-main {
  font-size:17px; color:rgba(255,255,255,0.6);
  line-height:1.65; max-width:600px;
  position:relative; margin-bottom:32px;
}

.module-meta-bar {
  display:flex; gap:32px; flex-wrap:wrap;
  position:relative;
}

.meta-pill {
  display:flex; align-items:center; gap:8px;
  font-size:13px; color:rgba(255,255,255,0.5);
}

.meta-pill span { color:rgba(255,255,255,0.9); font-weight:500; }

/* CONTENT BODY */
.content-body { padding:48px 64px; max-width:900px; }

/* SECTION BLOCKS */
.section-block { margin-bottom:48px; }

.section-heading {
  font-family:'Playfair Display',serif;
  font-size:24px; font-weight:700;
  color:var(--navy); margin-bottom:20px;
  display:flex; align-items:center; gap:12px;
}

.section-heading::after {
  content:''; flex:1; height:1px;
  background:var(--warm);
}

/* OBJECTIVE CARDS */
.objectives-grid {
  display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:16px;
}

.objective-card {
  background:var(--white);
  border:1px solid #dde6ff;
  border-top:3px solid var(--gold);
  padding:20px;
  border-radius:4px;
  box-shadow: 0 1px 4px rgba(15,52,96,0.06);
}

.objective-icon { font-size:24px; margin-bottom:10px; }
.objective-title { font-size:14px; font-weight:600; color:var(--navy); margin-bottom:6px; }
.objective-desc { font-size:13px; color:var(--muted); line-height:1.55; }

/* LESSON CARDS */
.lesson-card {
  background:var(--white);
  border:1px solid #dde6ff;
  border-radius:4px;
  margin-bottom:16px;
  overflow:hidden;
  box-shadow: 0 1px 4px rgba(15,52,96,0.06);
}

.lesson-header {
  display:flex; align-items:center; gap:16px;
  padding:20px 24px;
  cursor:pointer;
  transition:background 0.2s;
  user-select:none;
}

.lesson-header:hover { background:#f8faff; }

.lesson-num {
  width:36px; height:36px;
  background:linear-gradient(135deg, var(--navy), var(--blue));
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:700; color:var(--white);
  flex-shrink:0;
}

.lesson-info { flex:1; }
.lesson-title { font-size:15px; font-weight:600; color:var(--navy); }
.lesson-duration { font-size:12px; color:var(--muted); margin-top:2px; }
.lesson-chevron { font-size:12px; color:var(--muted); transition:transform 0.3s; }
.lesson-card.open .lesson-chevron { transform:rotate(180deg); }

.lesson-body {
  padding:0 24px;
  max-height:0; overflow:hidden;
  transition:max-height 0.4s ease, padding 0.3s;
}

.lesson-card.open .lesson-body {
  max-height:2000px;
  padding:0 24px 24px;
}

.lesson-content { border-top:1px solid #e8eeff; padding-top:20px; }

.lesson-section-title {
  font-size:12px; font-weight:600;
  letter-spacing:1.5px; text-transform:uppercase;
  color:var(--purple); margin-bottom:12px;
}

.lesson-text {
  font-size:14px; color:#334155;
  line-height:1.8; margin-bottom:16px;
}

.lesson-points {
  list-style:none;
  display:flex; flex-direction:column; gap:10px;
  margin-bottom:20px;
}

.lesson-points li {
  display:flex; align-items:flex-start; gap:10px;
  font-size:14px; color:#1e293b; line-height:1.6;
}

.lesson-points li::before {
  content:'→'; color:var(--gold);
  font-weight:700; flex-shrink:0; margin-top:1px;
}

/* SCENARIO EXERCISE */
.scenario-box {
  background:linear-gradient(135deg, #1a1a2e, #0f3460);
  border-radius:4px; padding:32px;
  margin:24px 0; position:relative; overflow:hidden;
}

.scenario-box::before {
  content:'';
  position:absolute; top:-40px; right:-40px;
  width:150px; height:150px;
  background:rgba(245,158,11,0.1);
  border-radius:50%;
}

.scenario-label {
  font-size:10px; font-weight:700;
  letter-spacing:2px; text-transform:uppercase;
  color:var(--gold); margin-bottom:12px;
}

.scenario-title {
  font-family:'Playfair Display',serif;
  font-size:20px; font-weight:700;
  color:var(--white); margin-bottom:12px;
}

.scenario-desc {
  font-size:14px; color:rgba(255,255,255,0.65);
  line-height:1.7; margin-bottom:20px;
}

.scenario-steps {
  list-style:none;
  display:flex; flex-direction:column; gap:10px;
  margin-bottom:24px;
}

.scenario-steps li {
  display:flex; align-items:flex-start; gap:12px;
  font-size:13px; color:rgba(255,255,255,0.7);
  line-height:1.5;
}

.step-num {
  width:22px; height:22px;
  background:var(--gold); color:var(--navy);
  border-radius:50%; display:flex; align-items:center;
  justify-content:center; font-size:11px; font-weight:700;
  flex-shrink:0; margin-top:1px;
}

/* INTERACTIVE PROMPT BUILDER */
.prompt-builder {
  background:var(--white);
  border:1px solid var(--warm);
  border-radius:4px; overflow:hidden;
  margin:24px 0;
}

.pb-header {
  background:var(--cream);
  padding:16px 20px;
  border-bottom:1px solid var(--warm);
  display:flex; align-items:center; gap:10px;
}

.pb-title {
  font-size:13px; font-weight:600; color:var(--navy);
}

.pb-badge {
  font-size:10px; font-weight:700;
  letter-spacing:1px; text-transform:uppercase;
  background:var(--gold); color:var(--navy);
  padding:2px 8px; border-radius:2px;
}

.pb-body { padding:20px; }

.pb-field { margin-bottom:16px; }

.pb-label {
  font-size:12px; font-weight:600;
  color:var(--navy); margin-bottom:6px;
  display:flex; align-items:center; gap:6px;
}

.pb-label-tag {
  font-size:10px; font-weight:600;
  letter-spacing:1px; text-transform:uppercase;
  color:var(--purple); background:#eef;
  padding:1px 6px; border-radius:2px;
}

.pb-input, .pb-select, .pb-textarea {
  width:100%; font-family:'DM Sans',sans-serif;
  font-size:13px; color:var(--text);
  border:1px solid var(--warm);
  padding:10px 12px; border-radius:2px;
  background:var(--white); transition:border 0.2s;
  outline:none;
}

.pb-input:focus, .pb-select:focus, .pb-textarea:focus {
  border-color:var(--gold);
}

.pb-textarea { resize:vertical; min-height:80px; }

.pb-btn {
  background:linear-gradient(135deg, var(--gold), var(--gold-light));
  color:var(--navy); font-family:'DM Sans',sans-serif;
  font-size:13px; font-weight:700;
  padding:12px 28px; border:none;
  cursor:pointer; transition:all 0.2s;
  letter-spacing:0.5px;
}

.pb-btn:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(245,158,11,0.4); }

.pb-output {
  margin-top:16px; padding:16px;
  background:#f8faff; border:1px solid var(--warm);
  border-left:3px solid var(--gold);
  font-size:13px; color:var(--text);
  line-height:1.7; white-space:pre-wrap;
  display:none; font-family:monospace;
}

.pb-output.visible { display:block; }

/* QUIZ */
.quiz-box {
  background:var(--white);
  border:1px solid var(--warm);
  border-radius:4px; overflow:hidden;
  margin:24px 0;
}

.quiz-header {
  background:linear-gradient(135deg, var(--purple), #4f46e5);
  padding:16px 24px;
  display:flex; align-items:center; gap:10px;
}

.quiz-header-title {
  font-size:13px; font-weight:600; color:var(--white);
}

.quiz-body { padding:24px; }

.quiz-question {
  font-size:15px; font-weight:600; color:#1a202c;
  margin-bottom:16px; line-height:1.5;
}

.quiz-options {
  display:flex; flex-direction:column; gap:10px;
  margin-bottom:20px;
}

.quiz-option {
  display:flex; align-items:center; gap:12px;
  padding:12px 16px;
  border:1px solid #e8eeff;
  cursor:pointer; transition:all 0.2s;
  font-size:14px; color:#1e293b;
  background:#ffffff;
}

.quiz-option:hover { border-color:var(--gold); background:#fffbf0; }
.quiz-option.selected { border-color:var(--gold); background:#fffbf0; }
.quiz-option.correct { border-color:var(--green); background:#f0fdf8; color:#065f46; }
.quiz-option.incorrect { border-color:var(--red); background:#fff5f5; color:#991b1b; }

.quiz-option input[type=radio] { accent-color:var(--gold); }

.quiz-btn {
  background:var(--navy); color:var(--white);
  font-family:'DM Sans',sans-serif;
  font-size:13px; font-weight:600;
  padding:10px 24px; border:none;
  cursor:pointer; transition:all 0.2s;
}

.quiz-btn:hover { background:var(--blue); }

.quiz-feedback {
  margin-top:16px; padding:14px 16px;
  border-radius:2px; font-size:13px;
  line-height:1.6; display:none;
}

.quiz-feedback.correct { background:#f0fdf4; color:#166534; border:1px solid #bbf7d0; }
.quiz-feedback.incorrect { background:#fef2f2; color:#991b1b; border:1px solid #fecaca; }
.quiz-feedback.visible { display:block; }

/* DELIVERABLE */
.deliverable-box {
  background:#f0fdf8;
  border:1px solid #a7f3d0;
  border-left:4px solid var(--green);
  padding:24px 28px; margin:24px 0;
}

.deliverable-label {
  font-size:11px; font-weight:700;
  letter-spacing:2px; text-transform:uppercase;
  color:var(--green); margin-bottom:10px;
}

.deliverable-title {
  font-size:18px; font-weight:700;
  color:#065f46; margin-bottom:8px;
}

.deliverable-desc {
  font-size:14px; color:#047857;
  line-height:1.7;
}

/* KEY CONCEPT */
.concept-box {
  background:#fffdf5;
  border:1px solid #fde68a;
  border-left:4px solid var(--gold);
  padding:20px 24px; margin:20px 0;
}

.concept-label {
  font-size:11px; font-weight:700;
  letter-spacing:2px; text-transform:uppercase;
  color:#b45309; margin-bottom:8px;
}

.concept-text {
  font-size:14px; color:#44403c;
  line-height:1.75;
}

/* PROMPT EXAMPLE */
.prompt-example {
  background:#1e293b;
  border-radius:4px; padding:20px 24px;
  margin:16px 0; position:relative;
}

.prompt-example-label {
  font-size:10px; font-weight:700;
  letter-spacing:2px; text-transform:uppercase;
  color:var(--gold); margin-bottom:12px;
}

.prompt-example-text {
  font-family:monospace; font-size:13px;
  color:#e2e8f0; line-height:1.7;
  white-space:pre-wrap;
}

.prompt-example-text .highlight { color:var(--gold-light); }

/* PROGRESS BUTTONS */
.module-nav-btns {
  display:flex; justify-content:space-between; align-items:center;
  padding:32px 64px;
  border-top:1px solid var(--warm);
  margin-top:48px;
}

.nav-btn {
  font-family:'DM Sans',sans-serif;
  font-size:13px; font-weight:600;
  padding:12px 28px; border:none;
  cursor:pointer; transition:all 0.2s;
  display:flex; align-items:center; gap:8px;
}

.nav-btn-prev {
  background:var(--white);
  border:1px solid var(--warm);
  color:var(--muted);
}

.nav-btn-prev:hover { border-color:var(--navy); color:var(--navy); }

.nav-btn-next {
  background:linear-gradient(135deg, var(--gold), var(--gold-light));
  color:var(--navy);
}

.nav-btn-next:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(245,158,11,0.35); }

.complete-btn {
  background:var(--green); color:var(--white);
  font-family:'DM Sans',sans-serif;
  font-size:13px; font-weight:600;
  padding:12px 28px; border:none; cursor:pointer;
  transition:all 0.2s;
}

.complete-btn:hover { background:#059669; }

/* RESPONSIVE */
@media(max-width:768px) {
  .layout { grid-template-columns:1fr; }
  .sidebar { position:relative; height:auto; }
  .module-header, .content-body { padding:32px 24px; }
  .module-nav-btns { padding:24px; }
}
</style>
</head>
<body>
<div class="layout">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">Claude for HR Professionals</div>
    <div class="sidebar-sub">Essential AI Competency</div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-label">
      <span>Your Progress</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>
  <nav class="module-nav" id="module-nav"></nav>
</aside>

<!-- MAIN -->
<main class="main" id="main-content"></main>

</div>

<script>
const modules = [
  {
    id: 1,
    title: "The HR AI Mindset",
    subtitle: "Why Claude Changes Everything",
    duration: "45 min",
    tag: "Foundation",
    desc: "Discover why most HR professionals use AI wrong — and learn the HR Prompt Framework that changes everything. This module is your foundation for the entire course.",
    objectives: [
      { icon: "🧠", title: "Understand AI Thinking vs. AI Searching", desc: "Learn the critical difference between using Claude as a search engine versus a strategic thinking partner." },
      { icon: "📐", title: "Master the HR Prompt Framework", desc: "Apply the Role → Context → Task → Constraints → Format model to every HR challenge you face." },
      { icon: "⚖️", title: "Navigate AI Ethics in HR", desc: "Handle confidentiality, bias, and data sensitivity responsibly when using AI in people functions." },
      { icon: "⚡", title: "Build Your First Master Template", desc: "Leave with a reusable prompt template you'll use across every future HR task." }
    ],
    lessons: [
      {
        title: "Why Most HR Professionals Use AI Wrong",
        duration: "8 min",
        content: {
          intro: "There's a reason most HR teams feel underwhelmed by AI. They're using it like a faster Google — typing short questions and expecting magic. Claude isn't a search engine. It's a thinking partner. The difference in output quality between a vague prompt and a structured one is not 10% better. It's 10x better.",
          points: [
            "Generic input = generic output. 'Write me a job description' produces the same result for everyone.",
            "Claude has no context about your company, culture, or candidate unless you give it that context.",
            "The skill isn't using Claude — it's directing Claude. Think of yourself as the creative director, Claude as the expert executor.",
            "HR professionals who learn to prompt well will outperform peers who use AI passively within 12 months.",
          ],
          concept: { label: "Core Concept", text: "Claude works best when you treat it like a brilliant new colleague on their first day. They're incredibly capable, but they need you to brief them properly. The quality of your brief determines the quality of their work." }
        },
        quiz: {
          question: "A colleague says: 'I tried Claude for HR and the outputs were mediocre — it's not that useful.' What's the most likely root cause?",
          options: [
            "Claude isn't powerful enough for HR tasks",
            "They used vague, context-free prompts",
            "HR is too complex for AI to handle",
            "They needed a paid subscription"
          ],
          correct: 1,
          feedback: "Correct! Mediocre outputs almost always come from mediocre prompts. Claude needs context, role, constraints, and format to produce professional-grade HR outputs. The tool is rarely the problem — the prompt is."
        }
      },
      {
        title: "The HR Prompt Framework: Role → Context → Task → Constraints → Format",
        duration: "12 min",
        content: {
          intro: "This framework is the single most important thing you'll learn in this course. Every great HR prompt you write will follow this structure — whether you're writing it consciously or not.",
          points: [
            "ROLE: Tell Claude who it is. 'You are a senior HRBP with 15 years of experience in tech companies...'",
            "CONTEXT: Give the situation. Industry, company size, culture, what's already happened, what's at stake.",
            "TASK: Be specific about exactly what you need. Not 'write a policy' but 'write a 500-word remote work policy covering...'",
            "CONSTRAINTS: What Claude must and must not do. Tone, length, what to avoid, compliance requirements.",
            "FORMAT: How you want the output structured. Bullet points, table, email, executive summary, etc."
          ],
          concept: { label: "The Framework in Action", text: "Without framework: 'Write a job description for an HR manager.' With framework: 'You are a senior talent acquisition specialist. Write a job description for an HR Manager at a 300-person SaaS company in Madrid. The role focuses on talent acquisition and HRBP functions. Avoid corporate jargon. Use inclusive language. Format: job title, 3-sentence hook, responsibilities (8 bullets), requirements (6 bullets), why join us (3 bullets). Max 500 words.'" }
        },
        promptBuilder: {
          title: "Build Your First HR Prompt",
          fields: [
            { id: "role", label: "Role", tag: "Who is Claude?", type: "input", placeholder: "e.g. Senior HRBP with 10 years in financial services..." },
            { id: "context", label: "Context", tag: "Situation", type: "textarea", placeholder: "e.g. 200-person fintech in Madrid, high-growth phase, expanding L&D function..." },
